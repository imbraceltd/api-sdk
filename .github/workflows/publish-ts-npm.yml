name: Publish NPM (TypeScript SDK)

on:
  release:
    types: [published] # Triggered when you click "Publish Release" on GitHub

concurrency:
  group: publish-npm
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ts

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ts/package-lock.json
          
      - name: Install dependencies
        run: npm ci
        
      - name: Lint
        run: npm run lint
        
      - name: Type check
        run: npm run typecheck
        
      - name: Run unit tests
        run: npm run test

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Required to read repository contents
      id-token: write   # IMPORTANT: Required for OIDC authentication with npm (no password needed)

    defaults:
      run:
        working-directory: ts

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js 20 for publishing
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build SDK
        run: npm run build

      - name: Check if version is already published
        id: check
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "version=$PKG_VERSION" >> $GITHUB_OUTPUT
          if npm view "$PKG_NAME@$PKG_VERSION" version > /dev/null 2>&1; then
            echo "published=true" >> $GITHUB_OUTPUT
            echo "::notice ::Version $PKG_VERSION already exists on npm. Skipping publish step."
          else
            echo "published=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish to npm
        if: steps.check.outputs.published == 'false'
        # Use --provenance to create a secure link between GitHub and npm
        run: npm publish --access public --provenance