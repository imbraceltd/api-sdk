name: Publish TypeScript SDK to npm

on:
  push:
    branches:
      - main
    paths:
      - "ts/**"

concurrency:
  group: publish-ts-npm
  cancel-in-progress: false

jobs:
  ci:
    name: Lint, Typecheck, Test (ts)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ts

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ts/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

  publish:
    name: Build & Publish to npm
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      contents: write
    defaults:
      run:
        working-directory: ts

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js for npm publish (OIDC)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          scope: '@imbrace'
          cache: npm
          cache-dependency-path: ts/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Read package name & version
        id: pkg
        shell: bash
        run: |
          echo "name=$(node -p "require('./package.json').name")" >> "$GITHUB_OUTPUT"
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check if version already exists on npm
        id: npm_check
        run: |
          if npm view "${{ steps.pkg.outputs.name }}@${{ steps.pkg.outputs.version }}" version > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm (OIDC)
        if: steps.npm_check.outputs.exists == 'false'
        run: npm publish --access public

      - name: Create GitHub Release
        if: steps.npm_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ts-v${{ steps.pkg.outputs.version }}
          name: TypeScript SDK v${{ steps.pkg.outputs.version }}
          generate_release_notes: true
